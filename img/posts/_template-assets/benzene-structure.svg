<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" role="img" aria-labelledby="title desc">
  <title id="title">Benzene Structure</title>
  <desc id="desc">A simple benzene ring structural formula diagram for markdown testing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
  </defs>
  <rect width="720" height="480" rx="32" fill="url(#bg)"/>
  <g transform="translate(360 240)">
    <circle r="82" fill="none" stroke="#4ba3c7" stroke-width="10"/>
    <polygon
      points="0,-138 119,-69 119,69 0,138 -119,69 -119,-69"
      fill="none"
      stroke="#102a43"
      stroke-width="10"
      stroke-linejoin="round"
    />
    <g fill="#102a43" font-family="'Segoe UI', Arial, sans-serif" font-size="28" text-anchor="middle">
      <text x="0" y="-172">CH</text>
      <text x="152" y="-84">CH</text>
      <text x="152" y="96">CH</text>
      <text x="0" y="182">CH</text>
      <text x="-152" y="96">CH</text>
      <text x="-152" y="-84">CH</text>
    </g>
  </g>
  <text x="360" y="428" fill="#486581" font-family="'Segoe UI', Arial, sans-serif" font-size="28" text-anchor="middle">
    Benzene skeletal formula for the markdown feature lab
  </text>
</svg>
