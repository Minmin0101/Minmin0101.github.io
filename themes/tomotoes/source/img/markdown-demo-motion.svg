<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Markdown 动图示例</title>
  <desc id="desc">使用 SVG 动画模拟动图效果</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2740"/>
      <stop offset="100%" stop-color="#5f7ec2"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <g fill="none" stroke="#cfe7ff" stroke-width="4" opacity=".55">
    <path d="M40 120c70 32 126 48 186 48s119-23 182-69 112-54 192-24">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M40 120c70 32 126 48 186 48s119-23 182-69 112-54 192-24;
                M40 130c70-28 126-42 186-42s119 29 182 73 112 54 192 18;
                M40 120c70 32 126 48 186 48s119-23 182-69 112-54 192-24"/>
    </path>
    <path d="M40 250c60-26 122-38 184-38 84 0 140 33 193 74 55 42 112 50 183 28">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
        values="M40 250c60-26 122-38 184-38 84 0 140 33 193 74 55 42 112 50 183 28;
                M40 258c60 34 122 52 184 52 84 0 140-25 193-63 55-39 112-50 183-30;
                M40 250c60-26 122-38 184-38 84 0 140 33 193 74 55 42 112 50 183 28"/>
    </path>
  </g>
  <g>
    <circle cx="160" cy="210" r="24" fill="#ffe08a">
      <animate attributeName="cy" dur="3.6s" values="210;182;210" repeatCount="indefinite"/>
      <animate attributeName="r" dur="3.6s" values="24;30;24" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="210" r="24" fill="#ffc680">
      <animate attributeName="cy" dur="4.1s" values="210;248;210" repeatCount="indefinite"/>
      <animate attributeName="r" dur="4.1s" values="24;31;24" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="210" r="24" fill="#ffd1dc">
      <animate attributeName="cy" dur="4.6s" values="210;190;210" repeatCount="indefinite"/>
      <animate attributeName="r" dur="4.6s" values="24;33;24" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="50%" y="84" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#eef6ff">Animated SVG Demo</text>
  <text x="50%" y="118" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="rgba(238,246,255,.82)">用于测试 Markdown 内动图与缩放效果</text>
</svg>
