# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: 衰小孩
subtitle: "热爱分享 & 生活记录"
description: "热爱分享与生活记录的个人博客，记录学习、折腾和日常灵感。"
keywords:
  - Hexo
  - Blog
  - 个人博客
author: 衰小孩
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://minmin0101.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: tomotoes

# Deployment
deploy:
  type: git
  repository: https://github.com/Minmin0101/Minmin0101.github.io.git
  branch: main
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# Word count
symbols_count_time:
  symbols: true
  time: true
  total_symbols: true
  total_time: true
  exclude_codeblock: false
  awl: 4
  wpm: 275

feed:
  type: rss2
  path: rss2.xml
  limit: 10
  hub:
  content: true

# Minifier
all_minifier: true
html_minifier:
  enable: true
css_minifier:
  enable: true
js_minifier:
  enable: true
image_minifier:
  enable: true
